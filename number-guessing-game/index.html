<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Genrator</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="number-gussing">
        <h1>NUMBER GUESSING GAME</h1>
        <span id="leftNum" class="number"></span>
        <button id="hoverBtn">Generate Number</button>
        <span id="rightNum" class="number"></span>
        <div class="user_guessing">
            <input type="number" placeholder="Start Guessing" id="userinput">
            <button id="submitBtn">Check</button>
            <h3 id="Warning">You Left With 3 Chances</h3>
            <h3 id="Difference"></h3>
            <h3 id="result"></h3>
            <button id="reset">RESET</button>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
